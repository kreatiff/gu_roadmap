name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build Docker image and trigger deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/kreatiff/gu_roadmap:latest
            ghcr.io/kreatiff/gu_roadmap:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Portainer webhook to redeploy stack
        run: curl -s -f -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
